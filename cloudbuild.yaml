steps:
  # Build the Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/jendee-ai:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/jendee-ai:latest
      - .

  # Push both tags
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/jendee-ai:$COMMIT_SHA]

  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/jendee-ai:latest]

  # Deploy to Cloud Run
  # NOTE: --set-secrets replaces ALL secrets; --update-env-vars only adds/updates named vars.
  # All required non-secret env vars are listed here so they survive every deploy.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - jendee-ai
      - --image=gcr.io/$PROJECT_ID/jendee-ai:$COMMIT_SHA
      - --platform=managed
      - --region=us-central1
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --timeout=3600
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,AUTH_SECRET=AUTH_SECRET:latest
      - --update-env-vars=NODE_ENV=production,PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser,AUTH_URL=https://jendee-ai-31067192249.us-central1.run.app,NEXT_PUBLIC_APP_URL=https://jendee-ai-31067192249.us-central1.run.app,AUTH_GOOGLE_ID=31067192249-i0vmagqo3bff0qna369bfdm5l1h6fr9h.apps.googleusercontent.com

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
