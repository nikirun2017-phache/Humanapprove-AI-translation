steps:
  # Build the Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/jendee-ai:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/jendee-ai:latest
      - .

  # Push both tags
  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/jendee-ai:$COMMIT_SHA]

  - name: gcr.io/cloud-builders/docker
    args: [push, gcr.io/$PROJECT_ID/jendee-ai:latest]

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - jendee-ai
      - --image=gcr.io/$PROJECT_ID/jendee-ai:$COMMIT_SHA
      - --platform=managed
      - --region=us-central1
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --timeout=3600
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,AUTH_SECRET=AUTH_SECRET:latest
      - --update-env-vars=NODE_ENV=production

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
